<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>だるま買取 長野店</title>

  <script>
    (function () {
      var languages = navigator.languages || [navigator.language || navigator.userLanguage || ''];
      var isJapanese = languages.some(function (language) {
        return language.toLowerCase().startsWith('ja');
      });

      if (isJapanese) {
        window.location.replace('/daruma-nagano/ja/');
      } else {
        window.location.replace('/daruma-nagano/en/');
      }
    })();
  </script>
</head>
<body>
  <p>言語設定に応じてページを移動します。</p>
  <p>
    <a href="/daruma-nagano/ja/">日本語ページへ移動</a><br>
    <a href="/daruma-nagano/en/">English page</a>
  </p>
</body>
</html>
